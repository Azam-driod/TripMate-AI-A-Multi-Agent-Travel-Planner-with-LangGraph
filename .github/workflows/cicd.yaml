name: TripMate CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: tripmate-ai-agent

jobs:

  ####################################
  # CONTINUOUS INTEGRATION
  ####################################
  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install flake8
          flake8 .

      - name: Run Tests
        run: |
          pip install pytest
          pytest

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

  ####################################
  # CONTINUOUS DEPLOYMENT
  ####################################
  cd:

    needs: ci

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tripmate-ai-agent:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tripmate-ai-agent:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tripmate-ai-agent:latest

            docker stop tripmate || true

            docker rm tripmate || true

            docker run -d \
              --name tripmate \
              --restart always \
              -p 80:8000 \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
              -e AVIATIONSTACK_API_KEY="${{ secrets.AVIATIONSTACK_API_KEY }}" \
              -e LANGCHAIN_API_KEY="${{ secrets.LANGCHAIN_API_KEY }}" \
              -e LANGCHAIN_TRACING_V2="true" \
              -e LANGCHAIN_PROJECT="TripMate" \
              ${{ secrets.DOCKERHUB_USERNAME }}/tripmate-ai-agent:latest