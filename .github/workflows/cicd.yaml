name: Tripmate CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write   # Required for AWS OIDC authentication
  contents: read

env:
  AWS_REGION: us-east-1                    # Change to your AWS Region
  ECR_REPOSITORY: tripmate-app             # Change to your Amazon ECR repository name
  ECS_SERVICE: tripmate-service            # Change to your ECS service name
  ECS_CLUSTER: tripmate-cluster            # Change to your ECS cluster name
  ECS_TASK_DEFINITION: .aws/task-def.json  # Path to your ECS task definition JSON file
  CONTAINER_NAME: tripmate                 # Container name in your ECS task definition

jobs:
  # =========================================================
  # STAGE 1: Continuous Integration (CI)
  # =========================================================
  ci:
    name: Continuous Integration (Lint & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff

      - name: Run Unit Tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          AVIATION_STACK_KEY: ${{ secrets.AVIATION_STACK_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "tripmate-ci"
        run: |
          pytest --maxfail=1 --disable-warnings -q

  # =========================================================
  # STAGE 2: Continuous Deployment (CD)
  # =========================================================
  cd:
    name: Continuous Deployment (Build & Deploy to AWS)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build image with build-time environment variables if needed
          docker build \
            --build-arg GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --build-arg TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            --build-arg AVIATION_STACK_KEY="${{ secrets.AVIATION_STACK_KEY }}" \
            --build-arg LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new Image ID in the Amazon ECS Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
